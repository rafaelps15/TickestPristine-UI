<!-- Cabeçalho -->
<div class="row mb-4">
  <div class="col-12">
    <div class="d-flex align-items-center justify-content-between">
      <h4 class="fw-bold py-3 mb-0"><span class="text-muted fw-light">Início /</span> Dashboard</h4>
      <span class="badge bg-label-primary p-2">
        <i class="bx bx-calendar me-1"></i> Junho, 2026
      </span>
    </div>
  </div>
</div>

<!-- Cards de Estatísticas -->
<div class="row">
  <div class="col-lg-3 col-md-6 col-sm-6 mb-4">
    <div class="card card-stats h-100">
      <div class="card-body">
        <div class="d-flex align-items-start justify-content-between">
          <div class="content-left">
            <span class="text-muted">Total de Tickets</span>
            <div class="d-flex align-items-end mt-2">
              <h3 class="mb-0 me-2">{{ stats.total }}</h3>
              <small class="text-success">(+15%)</small>
            </div>
            <small class="text-muted">Mensal</small>
          </div>
          <span class="badge bg-label-primary rounded p-2">
            <i class="bx bx-ticket fs-3"></i>
          </span>
        </div>
      </div>
    </div>
  </div>

  <div class="col-lg-3 col-md-6 col-sm-6 mb-4">
    <div class="card card-stats h-100 border-start border-warning border-4">
      <div class="card-body">
        <div class="d-flex align-items-start justify-content-between">
          <div class="content-left">
            <span class="text-muted">Em Aberto</span>
            <div class="d-flex align-items-end mt-2">
              <h3 class="mb-0 me-2 text-warning">{{ stats.open }}</h3>
            </div>
            <small class="text-muted">Aguardando Técnico</small>
          </div>
          <span class="badge bg-label-warning rounded p-2">
            <i class="bx bx-error-circle fs-3"></i>
          </span>
        </div>
      </div>
    </div>
  </div>

  <div class="col-lg-3 col-md-6 col-sm-6 mb-4">
    <div class="card card-stats h-100 border-start border-info border-4">
      <div class="card-body">
        <div class="d-flex align-items-start justify-content-between">
          <div class="content-left">
            <span class="text-muted">Pendentes</span>
            <div class="d-flex align-items-end mt-2">
              <h3 class="mb-0 me-2 text-info">{{ stats.pending }}</h3>
            </div>
            <small class="text-muted">Aguardando Cliente</small>
          </div>
          <span class="badge bg-label-info rounded p-2">
            <i class="bx bx-time-five fs-3"></i>
          </span>
        </div>
      </div>
    </div>
  </div>

  <div class="col-lg-3 col-md-6 col-sm-6 mb-4">
    <div class="card card-stats h-100 border-start border-success border-4">
      <div class="card-body">
        <div class="d-flex align-items-start justify-content-between">
          <div class="content-left">
            <span class="text-muted">Resolvidos</span>
            <div class="d-flex align-items-end mt-2">
              <h3 class="mb-0 me-2 text-success">{{ stats.resolved }}</h3>
              <small class="text-success">(92% taxa)</small>
            </div>
            <small class="text-muted">Finalizados</small>
          </div>
          <span class="badge bg-label-success rounded p-2">
            <i class="bx bx-check-double fs-3"></i>
          </span>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Gráfico -->
<div class="row">
  <div class="col-12 mb-4">
    <div class="card">
      <div class="card-header d-flex align-items-center justify-content-between">
        <h5 class="card-title m-0">Tendência de Tickets</h5>
        <div class="dropdown">
          <button class="btn p-0" type="button" id="cardOpt3" data-bs-toggle="dropdown" aria-haspopup="true" aria-expanded="false">
            <i class="bx bx-dots-vertical-rounded"></i>
          </button>
          <div class="dropdown-menu dropdown-menu-end" aria-labelledby="cardOpt3">
            <a class="dropdown-item" href="javascript:void(0);">Ver Relatório</a>
            <a class="dropdown-item" href="javascript:void(0);">Exportar PDF</a>
          </div>
        </div>
      </div>
      <div class="card-body">
        <div class="chart-container" style="position: relative; height: 350px;">
          <canvas #ticketChart></canvas>
        </div>
      </div>
    </div>
  </div>
</div>
